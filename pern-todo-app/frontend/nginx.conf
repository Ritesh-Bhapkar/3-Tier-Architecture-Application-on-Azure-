location /api/ {
    # Added Azure's Virtual IP DNS (168.63.129.16) for high availability
    resolver 127.0.0.11 168.63.129.16 ipv6=off valid=5s;

    set $backend "aca-api.internal.blackpebble-5fcbd73e.westus2.azurecontainerapps.io";
    
    proxy_pass http://$backend:80/;

    proxy_set_header Host $backend;
    proxy_http_version 1.1; 
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    
    # Help Nginx fail faster if DNS is slow, preventing the 499 "Pending" state
    proxy_connect_timeout 10s;
}