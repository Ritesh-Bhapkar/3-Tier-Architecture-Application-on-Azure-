server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # 1. Use the internal Azure DNS resolver
        resolver 127.0.0.11 valid=30s;

        set $backend "aca-api.internal.blackpebble-5fcbd73e.westus2.azurecontainerapps.io";
        
        # 2. FIX: Use http and port 80 (since your curl worked there)
        # ADDING A TRAILING SLASH HERE strips the "/api/" part before sending to Express
        proxy_pass http://$backend:80/;

        # 3. Standard headers for Azure Container Apps
        proxy_set_header Host $backend;
        proxy_http_version 1.1; 
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 4. Remove SSL settings if using HTTP to port 80
        # (Only re-add these if you switch back to https://$backend)
        
        # 5. Stability timeouts
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}