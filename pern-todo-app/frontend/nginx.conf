server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # The Bridge to your Private API
    location /api/ {
        # 1. Use http instead of https for internal traffic
        # 2. Explicitly add the port :5000 at the end
        proxy_pass http://aca-api.internal.kindsmoke-54f39054.westus2.azurecontainerapps.io:5000/;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}