server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # 1. Use the Internal FQDN with the explicit port 5000
        set $backend "aca-api.internal.blackpebble-5fcbd73e.westus2.azurecontainerapps.io";
        
        # 2. Proxy directly to the app port to avoid the 301 Redirect
        proxy_pass http://$backend:5000/;

        # 3. CRITICAL: Azure requires the Host header to match the FQDN
        proxy_set_header Host $backend;
        
        proxy_http_version 1.1; 
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 4. Increase timeouts for the database handshake
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}