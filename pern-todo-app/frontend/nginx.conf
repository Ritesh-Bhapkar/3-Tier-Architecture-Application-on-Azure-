server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # The bridge to the private backend
    location /api/ {
        # Define the exact internal FQDN from your Ingress screenshot
        set $backend "aca-api.internal.kindsmoke-54f39054.westus2.azurecontainerapps.io";
        
        # Bridge to the backend on port 5000 using HTTP
        proxy_pass http://$backend:5000/;

        # CRITICAL: Azure ACA requires the Host header to route traffic internally
        proxy_set_header Host $backend;
        
        # REQUIRED: ACA internal ingress enforces HTTP/1.1
        proxy_http_version 1.1; 
        
        # Standard headers to preserve client information
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # INCREASED TIMEOUTS: Prevents the "Loading tasks" 504/499 errors
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Prevents 499 errors if the browser disconnects while waiting
        proxy_ignore_client_abort on;
    }
}