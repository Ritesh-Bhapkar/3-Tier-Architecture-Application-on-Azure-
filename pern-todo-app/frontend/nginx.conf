location /api/ {
    # Use the EXACT internal FQDN from your portal
    set $backend_url "aca-api.internal.kindsmoke-54f39054.westus2.azurecontainerapps.io";
    
    # Bridge to the internal HTTP endpoint on port 5000
    proxy_pass http://$backend_url:5000/;
    
    # CRITICAL: Inform Azure which internal app to route to
    proxy_set_header Host $backend_url;
    
    # Required for Azure Container Apps ingress
    proxy_http_version 1.1; 
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    
    # Extend timeouts to handle cold starts (backend scaled to 0)
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
    proxy_read_timeout 300;
}