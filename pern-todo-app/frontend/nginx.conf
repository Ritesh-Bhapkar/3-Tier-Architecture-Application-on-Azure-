server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # 1. FIX: Disable IPv6 and shorten valid time to force retries
        resolver 127.0.0.11 ipv6=off valid=5s;

        set $backend "aca-api.internal.blackpebble-5fcbd73e.westus2.azurecontainerapps.io";
        
        # 2. Use http on port 80
        # The trailing slash "/" is critical to strip "/api" for your Express backend
        proxy_pass http://$backend:80/;

        # 3. Standard headers for Azure Container Apps
        proxy_set_header Host $backend;
        proxy_http_version 1.1; 
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 4. Stability timeouts
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}