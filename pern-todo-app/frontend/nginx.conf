server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # 1. Internal FQDN
        set $backend "aca-api.internal.blackpebble-5fcbd73e.westus2.azurecontainerapps.io";
        
        # 2. REMOVED trailing slash to allow correct path routing
        proxy_pass https://$backend;

        # 3. Required Host header
        proxy_set_header Host $backend;
        
        # 4. Required for Azure Internal HTTPS
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        
        proxy_http_version 1.1; 
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 5. Stability timeouts
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}