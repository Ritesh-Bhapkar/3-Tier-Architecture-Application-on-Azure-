location /api/ {
    # 1. UPDATED: Use https instead of http
    set $backend "aca-api.internal.blackpebble-5fcbd73e.westus2.azurecontainerapps.io";
    proxy_pass https://$backend/todos; # Changed to https

    # 2. CRITICAL: Keep the Host header
    proxy_set_header Host $backend;
    
    # 3. REQUIRED for SSL handshakes between containers
    proxy_ssl_server_name on;
    proxy_ssl_verify off; # Internal traffic is safe to skip verification
    
    proxy_http_version 1.1;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}