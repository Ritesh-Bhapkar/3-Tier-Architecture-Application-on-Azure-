trigger: 
  branches:
    include:
      - master
  paths:
    include:
      - Infra/*
      - pipeline/infra-deployment.yaml

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureServiceConnection: 'gbp-sc-ritesh'
  resourceGroupName: 'gbp-devops-ritesh'
  location: 'eastus'
  templateFile: 'Infra/main.bicep'
  # Make sure these are defined in your Pipeline Library/Variables!
  # dbUser: 'psqladmin'
  # dbPassword: 'your_secret_password'
  # acrPassword: 'your_acr_secret'

stages:
- stage: DeployInfrastructure
  displayName: 'Infrastructure Deployment'
  jobs:
  - job: BicepDeploy
    steps:
    - checkout: self
      displayName: 'Download Repository Files'

    - task: AzureResourceManagerTemplateDeployment@3
      displayName: 'Deploy Bicep with Automation'
      inputs:
        deploymentScope: 'Resource Group'
        azureResourceManagerConnection: $(azureServiceConnection)
        subscriptionId: 'aca42f90-33f4-4476-875d-feb34fe201cb'
        action: 'Create Or Update Resource Group'
        resourceGroupName: $(resourceGroupName)
        location: $(location)
        templateLocation: 'Linked artifact'
        csmFile: $(templateFile)
        deploymentMode: 'Incremental'
        # FIXED: Removed hardcoded dbHost. Bicep will detect it automatically.
        overrideParameters: >
          -dbAdminPassword "$(dbPassword)"
          -dbPassword "$(dbPassword)"
          -dbUser "psqladmin"
          -acrPassword "$(acrPassword)"